name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          # prisma generate (postinstall) reads the schema but does not connect;
          # a syntactically valid URL is enough to satisfy prisma.config.ts.
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck
